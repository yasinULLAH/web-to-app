name: Build APK

on:
  workflow_dispatch:
    inputs:
      full_build:
        description: Run full APK build
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - codex/nativebridge-validation-report

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity Check (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Run fast sanity tasks
        run: |
          set -o pipefail
          ./gradlew --no-daemon --no-configuration-cache --stacktrace \
            :app:compileDebugKotlin \
            -x :app:syncShellTemplateApk \
            -x :shell:assembleRelease 2>&1 | tee gradle-sanity.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            echo "## Sanity Failure Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            grep -nE "FAILURE: Build failed|\\* What went wrong:|Caused by:" -A4 -B2 gradle-sanity.log | tail -n 200 >> "$GITHUB_STEP_SUMMARY" || true
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Showing tail of gradle-sanity.log in job output for quick debugging:"
            tail -n 240 gradle-sanity.log || true
            exit $status
          fi

      - name: Upload sanity logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
            **/*.log
            gradle-sanity.log
          if-no-files-found: warn
          retention-days: 7

  build-debug-apk:
    name: Build Debug APK
    needs: sanity
    if: always() && (github.event_name == 'push' || inputs.full_build == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew --no-daemon --no-configuration-cache --stacktrace :app:assembleDebug 2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            echo "## Build Failure Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            grep -nE "FAILURE: Build failed|\\* What went wrong:|Caused by:" -A4 -B2 gradle-build.log | tail -n 220 >> "$GITHUB_STEP_SUMMARY" || true
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Showing tail of gradle-build.log in job output for quick debugging:"
            tail -n 260 gradle-build.log || true
            exit $status
          fi

      - name: Locate generated APKs
        if: always()
        run: |
          echo "Searching APK outputs..."
          find app/build/outputs -type f -name "*.apk" -print || true

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-to-app-debug-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
            **/*.log
            gradle-build.log
          if-no-files-found: warn
          retention-days: 7
