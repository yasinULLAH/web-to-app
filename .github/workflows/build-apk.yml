name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - codex/nativebridge-validation-report

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Install Android packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;28.2.13676358"

      - name: Build debug APK
        run: ./gradlew --no-daemon --no-configuration-cache --stacktrace :app:assembleDebug

      - name: Locate generated APKs
        run: |
          echo "Searching APK outputs..."
          find app/build/outputs -type f -name "*.apk" -print || true

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-to-app-debug-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7
